likelihood:
  stb: import_module('llihood_Observables').logp
params:
  p:
    value: 3
  c:
    value: 0
  therm:
    value: 0
  rad_noise:
    value: 0
  logphi0:
    prior:
      dist: norm
      loc: 1.05206
      scale: 0.381546
    ref:
      dist: norm
      loc: 0.566429
      scale: 0.1
    latex: \log_{10} \phi_0
  phi0:
    value: 'lambda logphi0: 10**logphi0'
    latex: \phi_0
  loggst:
    prior:
      min: 0.0
      max: 3.0
    ref:
      dist: norm
      loc: 1.46339
      scale: 0.3
    latex: \log_{10} g_*
  gst:
    value: 'lambda loggst: 10**loggst'
    latex: g_*
  logV0:
    prior:
      dist: norm
      loc: -19.0966
      scale: 4.52179
    ref:
      dist: norm
      loc: -23.7408
      scale: 1.0
    latex: \log_{10} V_0
  V0:
    value: 'lambda logV0: 10**logV0'
    latex: V_0
  logQ0:
    prior:
      dist: norm
      loc: 0.427263
      scale: 1.11572
    ref:
      dist: norm
      loc: 1.60487
      scale: 0.3
    latex: \log_{10} Q_0
  Q0:
    value: 'lambda logQ0: 10**logQ0'
    latex: Q_0
  Np:
    value: 1.0
    latex: N_P
sampler:
  mcmc:
    drag: false
    oversample_power: 0.4
    proposal_scale: 1.9
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    max_tries: 100000d
output: quartic_T3
