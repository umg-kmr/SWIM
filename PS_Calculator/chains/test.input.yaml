likelihood:
  test:
    external: import_module('llihood').logp
params:
  logphi0:
    prior:
      min: 0.5
      max: 1.8
    latex: \log_{10} \phi_0
  phi0:
    value: 'lambda logphi0: 10**logphi0'
    latex: \phi_0
  loggst:
    prior:
      min: 0.0
      max: 3.0
    latex: \log_{10} g_*
  gst:
    value: 'lambda loggst: 10**loggst'
    latex: g_*
  loglmbd:
    prior:
      min: -17.0
      max: -11.0
    latex: \log_{10} \Lambda
  lmbd:
    value: 'lambda loglmbd: 10**loglmbd'
    latex: \Lambda
  logCy:
    prior:
      min: 4.0
      max: 9.0
    latex: \log_{10} C_{\Upsilon}
  Cy:
    value: 'lambda logCy: 10**logCy'
    latex: C_{\Upsilon}
sampler:
  mcmc:
    Rminus1_stop: 0.01
    Rminus1_cl_level: 0.06
    max_tries: 1000d
    covmat: auto
    learn_proposal: true
output: test
