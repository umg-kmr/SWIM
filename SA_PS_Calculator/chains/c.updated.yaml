likelihood:
  planck_2018_lowl.TT:
    lmin: 2
    lmax: 29
    type: CMB
    aliases:
    - lowT
    speed: -1
    stop_at_error: false
    version: null
    input_params:
    - A_planck
    output_params: []
  act_dr6_cmbonly.PlanckActCut:
    path: null
    dataset_file: plik_lite_v22.dataset
    dataset_params:
      use_cl: tt te ee
      lmin_cuts: 0 0 0
      lmax_cuts: 1000 600 600
    aliases:
    - plikHM_TTTEEE
    speed: 200
    type: CMB
    stop_at_error: false
    version: null
    input_params:
    - A_planck
    output_params: []
  act_dr6_cmbonly:
    url: https://lambda.gsfc.nasa.gov/data/act/pspipe/sacc_files/
    input_file: dr6_data_cmbonly.fits
    data_folder: ACTDR6CMBonly
    version: v1.0
    ell_cuts:
      TT:
      - 600
      - 6500
      TE:
      - 600
      - 6500
      EE:
      - 600
      - 6500
