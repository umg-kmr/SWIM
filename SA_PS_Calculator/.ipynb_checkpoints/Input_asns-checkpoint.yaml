#Only implements A_s, n_s and r (specified in Bg.cpp) constraints
#import the likelihood function from llihood.py
likelihood:
  stb: import_module('llihood').logp
  
params:
  p:
    value: 3
  c:
    value: 0
  therm:
    value: 0
  logphi0:
    prior:
      min: -1.0
      max: 2.5
    latex: \log_{10} \phi_0
  phi0: 
    value: 'lambda logphi0: 10**logphi0'
    latex: \phi_0
  loggst:
    prior:
      min: 0.0
      max: 3.0
        #ref:
        #dist: norm
        #loc: 1.76745
        #scale: 0.637099
    latex: \log_{10} g_*
  gst:
    value: 'lambda loggst: 10**loggst'
    latex: g_*
  logV0:
    prior:
      min: -30.0
      max: -10.0
        #ref:
        #dist: norm
        #loc: 0.00290979
        #scale: 0.0126343
    latex: \log_{10} V_0
  V0:
    value: 'lambda logV0: 10**logV0'
    latex: V_0
  logQ0:
    prior:
      min: -6.0
      max: 3.5
    latex: \log_{10} Q_0
  Q0:
    value: 'lambda logQ0: 10**logQ0'
    latex: Q_0
  Np:
    value: 1.0
    latex: N_P
sampler:
  #minimize:
  #  method: iminuit
  #  ignore_prior: True
  #  best_of: 8
  #  override_bobyqa:
  #    rhoend: 1e-8 
  mcmc:
    drag: false  #keep this to false as all parameters will have same speeds and dragging will not work
    oversample_power: 0.4
    proposal_scale: 1.9
    #covmat: 
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    max_tries: 100000d 
resume: True
output: chains_Asns/quartic_T3 
