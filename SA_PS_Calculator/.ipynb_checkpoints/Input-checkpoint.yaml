#This input file can be used to perform full-scale CMB dataset analysis, varying also the cosmological parameters. The semi-analytical power spectrum calculator computes the WI scalar primordial power spectrum which is then injected to CAMB as external primordial power spectrum.

theory:
  An_CAMB.FeaturePrimordialPk:
    python_path: "."
    kp: 0.05
  camb:
    external_primordial_pk: True
    extra_args:
      lens_potential_accuracy: 4
      lmax: 4000
      lens_margin: 1250
      AccuracyBoost: 1
      lSampleBoost: 1
      lAccuracyBoost: 1
      halofit_version: mead2016
      num_massive_neutrinos: 1
      nnu: 3.044
      theta_H0_range:
      - 20
      - 100
#packages_path: /path/to/cobaya

#requires that the Planck, DESI DR2, ACT DR6, SPT likelihoods are installed. Follow the Cobaya documentation to install these likelihoods
likelihood:
  bao.desi_dr2: null
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE_sroll2: null
  act_dr6_cmbonly.PlanckActCut:
    dataset_params:
      use_cl: tt te ee
      lmin_cuts: 0 0 0
      lmax_cuts: 1000 600 600
  act_dr6_cmbonly:
    stop_at_error: true
  act_dr6_lenslike.ACTDR6LensLike:
        lens_only: False
        stop_at_error: True
        lmax: 4000
        variant: actplanck_extended
  candl_like:
    additional_args: {}
    clear_internal_priors: true
    data_set_file: !!python/name:spt_candl_data.SPT3G_D1_TnE ''
    external: !!python/name:candl.interface.CandlCobayaLikelihood ''
    variant: "lite"
    feedback: true
    wrapper: null
params:
#WI model parameters for Quartic T^3
  p:
    value: 3
  c:
    value: 0
  therm:
    value: 0
  logphi0:
    prior:
      dist: norm
      loc: 1.05206
      scale: 0.381546
    ref:
      dist: norm
      loc: 0.566429
      scale: 0.1
    latex: \log_{10} \phi_0
  phi0: 
    value: 'lambda logphi0: 10**logphi0'
    latex: \phi_0
  loggst:
    prior:
      min: 0.0
      max: 3.0
    ref:
      dist: norm
      loc: 1.46339
      scale: 0.3
    latex: \log_{10} g_*
  gst:
    value: 'lambda loggst: 10**loggst'
    latex: g_*
  logV0:
    prior:
      dist: norm
      loc: -19.0966
      scale: 4.52179
    ref:
      dist: norm
      loc: -23.7408
      scale: 1.0
    latex: \log_{10} V_0
  V0:
    value: 'lambda logV0: 10**logV0'
    latex: V_0
  logQ0:
    prior:
      dist: norm
      loc: 0.427263
      scale: 1.11572
    ref:
      dist: norm
      loc: 1.60487
      scale: 0.3
    latex: \log_{10} Q_0
  Q0:
    value: 'lambda logQ0: 10**logQ0'
    latex: Q_0
  Np:
    value: 1.0
    latex: N_P

#Cosmological parameters
  theta_MC_100:
    prior:
      min: 0.5
      max: 10
    ref:
      dist: norm
      loc: 1.04109
      scale: 0.0004
    proposal: 0.0002
    latex: 100\theta_\mathrm{MC}
    drop: true
    renames: theta
  cosmomc_theta:
    value: 'lambda theta_MC_100: 1.e-2*theta_MC_100'
    derived: false
  H0:
    latex: H_0
    min: 20
    max: 100
  ombh2:
    prior:
      min: 0.005
      max: 0.1
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omch2:
    prior:
      min: 0.001
      max: 0.99
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.0005
    latex: \Omega_\mathrm{c} h^2
  omegam:
    latex: \Omega_\mathrm{m}
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  mnu: 0.06
  omega_de:
    latex: \Omega_\Lambda
  YHe:
    latex: Y_\mathrm{P}
  Y_p:
    latex: Y_P^\mathrm{BBN}
  DHBBN:
    derived: 'lambda DH: 10**5*DH'
    latex: 10^5 \mathrm{D}/\mathrm{H}
  tau:
    prior:
      min: 0.01
      max: 0.8
    ref:
      dist: norm
      loc: 0.055
      scale: 0.006
    proposal: 0.003
    latex: \tau_\mathrm{reio}
  zrei:
    latex: z_\mathrm{re}
  sigma8:
    latex: \sigma_8
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}  
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
  rdrag:
    latex: r_\mathrm{drag}
sampler:
  mcmc:
   drag: true
   oversample_power: 0.4
   proposal_scale: 1.9
   # burn_in: 200d
   covmat: quartic_T3.covmat
   Rminus1_stop: 0.01
   Rminus1_cl_stop: 0.2
   max_tries: 100000d
  #minimize:
  # method: bobyqa
  # ignore_prior: True
  #  covmat: Nat_c3_nontherm.covmat
  #polychord:
    #nlive: 2d
    #num_repeats: d
    #nprior: 2nlive
    #precision_criterion: 0.0001
    #maximise : True 
resume: True
output: chains_fullCMB/quartic_T3
