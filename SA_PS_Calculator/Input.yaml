theory:
  An_CAMB.FeaturePrimordialPk:
    python_path: "."
    kp: 0.05
  camb:
    external_primordial_pk: True
    extra_args:
      lens_potential_accuracy: 4
      lmax: 4000
      lens_margin: 1250
      AccuracyBoost: 1
      lSampleBoost: 1
      lAccuracyBoost: 1
      halofit_version: mead2016
      num_massive_neutrinos: 1
      nnu: 3.044
      theta_H0_range:
      - 20
      - 100
        #packages_path: /home/umang.kumar/cobaya/
likelihood:
  bao.desi_dr2: null
  planck_2018_lowl.TT: null
  #planck_2018_lowl.EE: null
  planck_2018_lowl.EE_sroll2: null
  act_dr6_cmbonly.PlanckActCut:
    dataset_params:
      use_cl: tt te ee
      lmin_cuts: 0 0 0
      lmax_cuts: 1000 600 600
  #planck_NPIPE_highl_CamSpec.TTTEEE: null
  #planckpr4lensing:
  #  package_install:
  #    github_repository: carronj/planck_PR4_lensing
  #    min_version: 1.0.2
  act_dr6_cmbonly:
    stop_at_error: true
  act_dr6_lenslike.ACTDR6LensLike:
        lens_only: False
        stop_at_error: True
        lmax: 4000
        variant: actplanck_extended
params:
  p:
    value: 3
  c:
    value: 0
  therm:
    value: 1
  n:
    value: 2.0
  logalph:
    prior:
      min: -20.0
      max: 2.0
        #ref:
        #dist: norm
        #loc: -2.09785
        #scale: 0.563678
    latex: \log_{10} \alpha
  alph:
    value: 'lambda logalph: 10**logalph'
    latex: \alpha
  phi0:
    value: 'lambda n,alph: (( 1.05*(n-1)/(n*alph) )**(1/n))'
    latex: \phi_0
  loggst:
    prior:
      min: 0.0
      max: 3.0
        #ref:
        #dist: norm
        #loc: 1.76745
        #scale: 0.637099
    latex: \log_{10} g_*
  gst:
    #value: 106.75
    value: 'lambda loggst: 10**loggst'
    latex: g_*
  logV0:
    prior:
      min: -80.0
      max: -1.0
        #ref:
        #dist: norm
        #loc: 0.00290979
        #scale: 0.0126343
    latex: \log_{10} V_0
  V0:
    value: 'lambda logV0: 10**logV0'
    latex: V_0
  logCy:
    prior:
      min: -60.0
      max: 60.0
        #ref:
        #dist: norm
        #loc: 14.4801
        #scale: 0.234177
    latex: \log_{10} C_{\Upsilon}
  Cy:
    value: 'lambda logCy: 10**logCy'
    latex: C_{\Upsilon}
  Np:
    value: 1.0
    latex: N_P
  theta_MC_100:
    prior:
      min: 0.5
      max: 10
    ref:
      dist: norm
      loc: 1.04109
      scale: 0.0004
    proposal: 0.0002
    latex: 100\theta_\mathrm{MC}
    drop: true
    renames: theta
  cosmomc_theta:
    value: 'lambda theta_MC_100: 1.e-2*theta_MC_100'
    derived: false
  H0:
    latex: H_0
    min: 20
    max: 100
  ombh2:
    prior:
      min: 0.005
      max: 0.1
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omch2:
    prior:
      min: 0.001
      max: 0.99
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.0005
    latex: \Omega_\mathrm{c} h^2
  omegam:
    latex: \Omega_\mathrm{m}
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  mnu: 0.06
  omega_de:
    latex: \Omega_\Lambda
  YHe:
    latex: Y_\mathrm{P}
  Y_p:
    latex: Y_P^\mathrm{BBN}
  DHBBN:
    derived: 'lambda DH: 10**5*DH'
    latex: 10^5 \mathrm{D}/\mathrm{H}
  tau:
    prior:
      min: 0.01
      max: 0.8
    ref:
      dist: norm
      loc: 0.055
      scale: 0.006
    proposal: 0.003
    latex: \tau_\mathrm{reio}
  zrei:
    latex: z_\mathrm{re}
  sigma8:
    latex: \sigma_8
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}  
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
  rdrag:
    latex: r_\mathrm{drag}
sampler:
  mcmc:
   drag: true
   oversample_power: 0.4
   proposal_scale: 1.9
   #covmat: logpot_full.covmat
   Rminus1_stop: 0.01
   Rminus1_cl_stop: 0.2
   max_tries: 100000d
  #minimize:
  # method: bobyqa
  # ignore_prior: True
  #  covmat: Nat_c3_nontherm.covmat
  #polychord:
    #nlive: 2d
    #num_repeats: d
    #nprior: 2nlive
    #precision_criterion: 0.0001
    #maximise : True 
resume: True
output: chains/c
